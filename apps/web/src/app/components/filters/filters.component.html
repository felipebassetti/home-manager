<form class="filters" (ngSubmit)="submit()">
  <label>
    <span>Onde</span>
    <input type="text" name="city" [(ngModel)]="filters.city" placeholder="Curitiba" />
  </label>

  <label>
    <span>Bairro</span>
    <select name="neighborhood" [(ngModel)]="filters.neighborhood">
      <option value="">Todos os bairros</option>
      @for (neighborhood of neighborhoodOptions; track neighborhood) {
        <option [value]="neighborhood">{{ neighborhood }}</option>
      }
    </select>
  </label>

  <label>
    <span>Preço máximo</span>
    <input
      type="text"
      name="maxPrice"
      [value]="maxPriceInput"
      (input)="onPriceInput($event)"
      placeholder="R$ 1.200"
      inputmode="numeric"
    />
  </label>

  <div class="actions">
    <button type="submit">Buscar</button>
    <button type="button" class="secondary" (click)="reset()">Limpar</button>
  </div>
</form>
