<form class="filters" (ngSubmit)="submit()">
  <label>
    <span>Onde</span>
    <input type="text" name="city" [(ngModel)]="filters.city" placeholder="Curitiba" />
  </label>

  <div class="dropdown-field" #neighborhoodMenu>
    <span>Bairro</span>
    <button type="button" class="dropdown-trigger" (click)="toggleNeighborhoodMenu()" [attr.aria-expanded]="isNeighborhoodMenuOpen">
      <span>{{ selectedNeighborhoodsLabel() }}</span>
    </button>

    @if (isNeighborhoodMenuOpen) {
      <div class="dropdown-panel">
        <button type="button" class="dropdown-clear" (click)="clearNeighborhoods()">Limpar selecao</button>
        <label class="checkbox-option">
          <span>Todos os bairros</span>
          <input type="checkbox" [checked]="filters.neighborhood?.length === 0" (change)="clearNeighborhoods()" />
        </label>

      @for (neighborhood of neighborhoodOptions; track neighborhood) {
        <label class="checkbox-option">
          <span>{{ neighborhood }}</span>
          <input
            type="checkbox"
            [checked]="filters.neighborhood?.includes(neighborhood)"
            (change)="toggleNeighborhood(neighborhood)"
          />
        </label>
      }
      </div>
    }
  </div>

  <label>
    <span>Preço máximo</span>
    <input
      type="text"
      name="maxPrice"
      [value]="maxPriceInput"
      (input)="onPriceInput($event)"
      placeholder="R$ 1.200"
      inputmode="numeric"
    />
  </label>

  <div class="actions">
    <button type="submit">Buscar</button>
    <button type="button" class="secondary" (click)="reset()">Limpar</button>
  </div>
</form>
