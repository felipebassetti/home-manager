<a class="house-card spotlight-card" appSpotlightCard [routerLink]="['/houses', house.id]">
  <div class="image-frame">
    <img [src]="house.imageUrl" [alt]="house.title" />
    <span class="listing-badge">{{ house.availableRooms }} vagas</span>
  </div>

  <div class="card-body">
    <div class="card-heading">
      <div>
        <h3>{{ house.title }}</h3>
        <p>{{ house.city }} • {{ house.neighborhood }}</p>
      </div>
      <strong class="price">{{ house.lowestPrice | currency: 'BRL' : 'symbol' : '1.0-0' }}</strong>
    </div>

    <p class="description">{{ house.description }}</p>

    <div class="meta-row">
      <span>{{ house.rooms.length }} quartos</span>
      <span>{{ house.availableRooms }} disponiveis</span>
    </div>

    <span class="action">Ver detalhes</span>
  </div>
</a>
