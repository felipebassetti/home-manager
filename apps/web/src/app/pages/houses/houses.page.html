<section class="page-head">
  <div>
    <h1>Casas compartilhadas em Curitiba</h1>
    <p>Busque por bairro e preço máximo para filtrar as vagas rapidamente.</p>
  </div>
  <strong class="result-count">{{ houses().length }} resultados</strong>
</section>

<app-filters [initialFilters]="activeFilters()" (filtersChange)="onFiltersChange($event)" />

<section class="results-grid">
  @for (house of paginatedHouses().items; track house.id) {
    <app-house-card [house]="house" />
  } @empty {
    <div class="empty-state">
      <strong>Nenhuma casa encontrada</strong>
      <p>Ajuste os filtros para ampliar a busca.</p>
    </div>
  }
</section>

<app-pagination [totalItems]="houses().length" [currentPage]="paginatedHouses().currentPage" [pageSize]="12" itemLabel="casas" (pageChange)="currentPage.set($event)" />
