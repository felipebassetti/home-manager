<div class="shell">
  <header class="topbar">
    <div class="topbar-main">
      <a routerLink="/" class="brand">Republic House</a>

      <nav class="nav-tabs">
        @for (item of navItems; track item.href) {
          <a
            [routerLink]="item.href"
            routerLinkActive="active"
            [routerLinkActiveOptions]="item.href === '/' ? { exact: true } : { exact: false }"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </div>

    <div class="topbar-actions">
      <div class="mode-badge">Mock first</div>

      <label class="profile-picker">
        <span>Perfil ativo</span>
        <select [value]="auth.activeProfile().id" (change)="auth.setActiveProfile($any($event.target).value)">
          @for (profile of auth.profiles; track profile.id) {
            <option [value]="profile.id">{{ profile.name }} - {{ profile.accountType }}</option>
          }
        </select>
      </label>
    </div>
  </header>

  <main class="page-frame">
    <section class="context-strip">
      <div class="context-copy">
        <strong>{{ auth.activeProfile().name }}</strong>
        <p>{{ auth.accountLabel() }} - Supabase {{ auth.isSupabaseConfigured ? 'configurado' : 'pendente' }}</p>
      </div>

      <div class="context-links">
        @for (item of navItems; track item.href) {
          <a [routerLink]="item.href">{{ item.shortLabel }}</a>
        }
      </div>
    </section>

    <router-outlet />
  </main>
</div>
